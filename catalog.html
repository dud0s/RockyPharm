<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RockyPharm – магазин спортивного питания</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <div class="logo">🏋️‍♂️ RockyPharm</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Поиск товаров...">
            <button id="searchBtn">найти</button>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="cartIcon">
                🛒 <span id="cartCount" class="cart-count">0</span>
            </button>
        </div>
    </div>
</header>

<nav class="categories">
    <div class="container">
        <a href="#" data-category="all" class="category-link active">Все товары</a>
        <a href="#" data-category="protein" class="category-link">Протеины</a>
        <a href="#" data-category="amino" class="category-link">Аминокислоты</a>
        <a href="#" data-category="gainer" class="category-link">Гейнеры</a>
        <a href="#" data-category="snack" class="category-link">Снэки</a>
        <a href="#" data-category="vitamin" class="category-link">Витамины</a>
        <a href="#" data-category="creatine" class="category-link">Креатин</a>
    </div>
</nav>

<main class="container">
    <div class="hero">
        <div class="hero-text">
            <h2>−20% на первый заказ</h2>
            <p>Промокод: <strong>FUEL20</strong></p>
            <button class="btn" id="heroBtn">В каталог</button>
        </div>
        <div class="hero-logo">
            <img src="logo2.png" alt="SportFuel" style="height: 80px; width: auto;">
        </div>
    </div>

    <h2 class="section-title">Наши товары</h2>
    <div class="products-grid" id="productsGrid"></div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-col">
            <h4>RockyFarm</h4>
            <p>Спортивное питание с доставкой по России</p>
        </div>
        <div class="footer-col">
            <h4>Контакты</h4>
            <ul>
                <li>support@rockypharm.ru</li>
                <li>+7 (800) 555-35-35</li>
            </ul>
        </div>
    </div>
    <div class="footer-bottom">© 2025 SportFuel</div>
</footer>

<!-- Модальное окно корзины -->
<div id="cartModal" class="cart-modal">
    <div class="cart-panel">
        <div class="cart-header">
            <span>🛒 Корзина</span>
            <button class="close-modal" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsList"></div>
        <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
        <button class="btn" id="checkoutBtn">Оформить заказ</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
