<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RockyPharm – эксклюзивное спортивное питание</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специальные стили только для приветственной страницы */
        body.welcome-page {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-image: url('fon-test2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
        }
        /* Полноэкранное затемнение */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }
        /* Контент поверх затемнения */
        .welcome-content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        /* Шапка */
        .welcome-header {
            padding: 2rem 2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .welcome-logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .welcome-nav a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .welcome-nav a:hover {
            color: #D4AF37;
        }
        /* Главный блок */
        .welcome-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .promo-card {
            background: rgba(21, 21, 21, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #D4AF37;
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .badge {
            color: #D4AF37;
            letter-spacing: 3px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .product-title {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 1rem 0;
            text-transform: uppercase;
        }
        .product-sub {
            font-size: 1.2rem;
            color: #FFD700;
            margin-bottom: 1.5rem;
        }
        .product-weight {
            font-size: 2rem;
            font-weight: bold;
            color: #FFD700;
            margin: 1rem 0;
        }
        .brand {
            font-size: 1rem;
            color: #aaa;
            margin-top: 1.5rem;
            letter-spacing: 1px;
        }
        .cta-btn {
            background: #D4AF37;
            color: #0a0a0a;
            padding: 0.9rem 2.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }
        .cta-btn:hover {
            background: #FFD700;
            transform: scale(1.02);
        }
        .slogan {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #ccc;
            font-style: italic;
        }
        /* Футер */
        .welcome-footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }
        @media (max-width: 768px) {
            .welcome-header {
                flex-direction: column;
                gap: 1rem;
            }
            .welcome-nav a {
                margin: 0 1rem;
            }
            .product-title {
                font-size: 1.8rem;
            }
            .product-weight {
                font-size: 1.5rem;
            }
            .promo-card {
                padding: 2rem 1.5rem;
            }
            @media (max-width: 640px) {
            .welcome-header {
                flex-direction: column;
                gap: 0.8rem;
                text-align: center;
            }
            .welcome-nav a {
                margin: 0 0.8rem;
                font-size: 0.9rem;
            }
            .promo-card {
                padding: 1.5rem;
                width: 95%;
            }
            .product-title {
                font-size: 1.4rem;
            }
            .product-weight {
                font-size: 1.4rem;
            }
            .cta-btn {
                padding: 0.6rem 1.5rem;
                font-size: 1rem;
            }
            .welcome-footer {
                font-size: 0.7rem;
            }
}
        }
    </style>
</head>
<body class="welcome-page">
    <div class="welcome-overlay"></div>
    <div class="welcome-content">
        <div class="welcome-header">
            <div class="welcome-logo">🏋️‍♂️ RockyPharm</div>
            <div class="welcome-nav">
                <a href="catalog.html">Каталог</a>
                <a href="#">Доставка</a>
                <a href="#">Контакты</a>
            </div>
        </div>

        <div class="welcome-main">
            <div class="promo-card">
                <div class="badge">🔥 НОВАЯ УПАКОВКА</div>
                <div class="product-title">
                    GOLD STANDARD<br>
                    100% WHEY
                </div>
                <div class="product-sub">DOUBLE RICH CHOCOLATE</div>
                <div class="product-weight">1.98 LB</div>
                <a href="catalog.html" class="cta-btn">УЗНАТЬ ПОДРОБНЕЕ →</a>
                <div class="brand">OPTIMUM NUTRITION</div>
                <div class="slogan">Твой идеальный протеин – теперь в новой упаковке</div>
            </div>
        </div>

        <div class="welcome-footer">
            © 2025 RockyPharm – магазин спортивного питания | Быстрая доставка по России
        </div>
    </div>
</body>
</html>
