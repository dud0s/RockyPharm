<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RockyPharm – спортивное питание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url('fon-test2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        /* Затемнение на весь экран */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }

        /* Контент поверх затемнения */
        .welcome-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Шапка */
        .welcome-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 2rem 3rem;
            gap: 1rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 1.1rem;
        }
        .nav-links a:hover {
            color: #D4AF37;
        }

        /* Центральный блок */
        .welcome-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .promo-card {
            background: rgba(21, 21, 21, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #D4AF37;
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            max-width: 700px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .badge {
            color: #D4AF37;
            letter-spacing: 3px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .product-title {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .product-sub {
            font-size: 1.2rem;
            color: #FFD700;
            margin-bottom: 1rem;
        }
        .product-weight {
            font-size: 1.8rem;
            font-weight: bold;
            color: #FFD700;
            margin: 1rem 0;
        }
        .brand {
            font-size: 1rem;
            color: #aaa;
            margin-top: 1rem;
        }
        .slogan {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #ccc;
            font-style: italic;
        }
        .cta-btn {
            display: inline-block;
            background: #D4AF37;
            color: #0a0a0a;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 3rem;
            text-decoration: none;
            margin-top: 1rem;
            transition: background 0.2s, transform 0.1s;
        }
        .cta-btn:hover {
            background: #FFD700;
            transform: scale(1.02);
        }

        /* Футер */
        .welcome-footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Адаптив */
        @media (max-width: 640px) {
            .welcome-header {
                flex-direction: column;
                text-align: center;
                padding: 1.5rem;
            }
            .nav-links {
                gap: 1rem;
            }
            .product-title {
                font-size: 1.8rem;
            }
            .product-weight {
                font-size: 1.4rem;
            }
            .promo-card {
                padding: 2rem 1.5rem;
            }
            .cta-btn {
                padding: 0.6rem 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-wrapper">
        <div class="welcome-header">
            <div class="logo">🏋️‍♂️ ROCKYPHARM</div>
            <div class="nav-links">
                <a href="catalog.html">Каталог</a>
                <a href="#">Доставка</a>
                <a href="#">Контакты</a>
            </div>
        </div>

        <div class="welcome-main">
            <div class="promo-card">
                <div class="badge">⭐ НОВАЯ УПАКОВКА</div>
                <div class="product-title">GOLD STANDARD<br>100% WHEY</div>
                <div class="product-sub">DOUBLE RICH CHOCOLATE</div>
                <div class="product-weight">1.98 LB</div>
                <a href="catalog.html" class="cta-btn">УЗНАТЬ ПОДРОБНЕЕ →</a>
                <div class="brand">OPTIMUM NUTRITION</div>
                <div class="slogan">Твой идеальный протеин – теперь в новой упаковке</div>
            </div>
        </div>

        <div class="welcome-footer">
            © 2026 RockyPharm – магазин спортивного питания | Быстрая доставка по России
        </div>
    </div>
</body>
</html>
